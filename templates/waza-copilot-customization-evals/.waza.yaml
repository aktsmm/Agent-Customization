# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/config.schema.json
paths:
  skills: skills/
  evals: evals/
  results: results/
defaults:
  engine: mock
  model: gpt-4.1
  timeout: 300
  parallel: false
  workers: 4
  verbose: false
cache:
  enabled: false
  dir: .waza-cache
server:
  port: 3000
  resultsDir: results/
tokens:
  warningThreshold: 2500
  fallbackLimit: 5000
graders:
  programTimeout: 60